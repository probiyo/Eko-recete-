<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL AGRO DOCTOR | Pro AI Terminal</title>
    <style>
        :root { --primary: #1b5e20; --accent: #ffd700; --danger: #d32f2f; --bg: #f4f7f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 480px; margin: auto; background: white; padding: 20px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 1px solid #e0e0e0; position: relative; }
        
        #lang-toggle { position: absolute; top: 20px; right: 20px; background: #eee; border: 1px solid #ccc; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .school-tag { font-size: 10px; color: #777; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        h1 { text-align: center; color: var(--primary); font-size: 22px; margin: 5px 0; }
        .author { text-align: center; font-size: 14px; font-weight: 600; color: #444; margin-bottom: 20px; }

        .card { background: #f9fdfa; padding: 15px; border-radius: 20px; margin-bottom: 12px; border: 1px solid #e8f0e9; }
        label { display: block; font-size: 11px; font-weight: 800; color: var(--primary); margin-bottom: 8px; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; border: 2px solid #d1d9d2; border-radius: 12px; font-size: 15px; outline: none; box-sizing: border-box; }

        .other-opt { background: #e8f5e9; color: var(--primary); font-weight: bold; text-align: center; padding: 10px; border-radius: 10px; cursor: pointer; margin-top: 5px; border: 1px dashed var(--primary); font-size: 13px; }

        #cam-box { display: none; margin-top: 15px; border-radius: 20px; overflow: hidden; border: 4px solid #333; position: relative; }
        video, canvas { width: 100%; height: 320px; object-fit: cover; }
        #canvas { display: none; position: absolute; top: 0; left: 0; }
        
        .scan-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .target { width: 220px; height: 220px; border: 2px solid var(--accent); border-radius: 20px; box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); }
        .hint { background: rgba(0,0,0,0.8); color: white; padding: 10px; border-radius: 10px; font-size: 11px; margin-top: 15px; text-align: center; width: 80%; }

        button { width: 100%; padding: 16px; border: none; border-radius: 15px; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .btn-main { background: var(--primary); color: white; }
        .btn-snap { background: #222; color: white; }
        .btn-reset { background: #555; color: white; display: none; }

        #res-area { display: none; margin-top: 20px; padding: 20px; border: 2px solid var(--primary); border-radius: 20px; background: #fff; }
        .res-body { font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.5; color: #1b5e20; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
        .expert-msg { background: #fff3e0; border-left: 5px solid #ff9800; padding: 10px; font-size: 12px; font-weight: bold; color: #e65100; }
        .error-msg { color: var(--danger); font-weight: bold; text-align: center; padding: 20px; border: 2px dashed var(--danger); border-radius: 15px; display: none; margin-top: 10px; }

        .footer { font-size: 9px; color: #aaa; text-align: center; margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="lang-toggle" onclick="toggleLang()">EN / TR</div>
    <div class="school-tag">Rize Fatih Anadolu Lisesi</div>
    <h1>GLOBAL TARIM DOKTORU</h1>
    <div class="author">Yusuf İhsan HAMAMCI <br><small>Biology Expert & Project Lead</small></div>

    <div id="form-area">
        <div class="card">
            <label id="lbl-reg">Region & Crop / Bölge ve Ürün</label>
            <select id="region">
                <option value="be-sugar">Brussels, BE - Sugar Beet (Şeker Pancarı)</option>
                <option value="nl-tulip">Netherlands - Tulips (Lale)</option>
                <option value="it-tomato">Italy - Tomatoes (Domates)</option>
                <option value="tr-tea">Turkey, Rize - Tea (Çay)</option>
                <option value="fr-grape">France - Vineyards (Üzüm)</option>
            </select>
            <div class="other-opt" onclick="document.getElementById('region').value='global-other'">
                + Global - Diğer / Other (Manual Selection)
            </div>
        </div>

        <div class="card">
            <label id="lbl-ph">Soil pH / Toprak pH</label>
            <input type="number" id="ph" step="0.1" placeholder="Ex: 4.5">
        </div>

        <button id="start-btn" class="btn-main" onclick="startSystem()">ANALİZİ BAŞLAT / START ANALYZE</button>
    </div>

    <div id="cam-box">
        <video id="v" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        <div class="scan-ui">
            <div class="target"></div>
            <div class="hint" id="hint-txt">Kamerayı yaprağa odaklayın.<br>Focus on the leaf.</div>
        </div>
        <button id="snap-btn" class="btn-snap" onclick="processAI()">FOTOĞRAF ÇEK / TAKE PHOTO</button>
    </div>

    <div id="error-box" class="error-msg"></div>

    <div id="res-area">
        <div style="border-bottom: 2px solid #eee; margin-bottom: 10px; font-weight: bold;">REÇETE / PRESCRIPTION #SCIENTIX-V9</div>
        <div id="res-output" class="res-body"></div>
        <div id="expert-note" class="expert-msg"></div>
        <button id="reset-btn" class="btn-reset" onclick="resetSystem()">YENİ ANALİZ / NEW ANALYZE</button>
        <div class="footer">
            © 2026 Yusuf İhsan HAMAMCI - Rize Fatih Anadolu Lisesi
        </div>
    </div>
</div>

<script>
    let lang = 'TR';
    let track;
    const v = document.getElementById('v');
    const c = document.getElementById('canvas');

    function toggleLang() {
        lang = lang === 'TR' ? 'EN' : 'TR';
        document.querySelector('h1').innerText = lang === 'TR' ? 'GLOBAL TARIM DOKTORU' : 'GLOBAL AGRO DOCTOR';
        document.getElementById('start-btn').innerText = lang === 'TR' ? 'ANALİZİ BAŞLAT' : 'START ANALYSIS';
        if(document.getElementById('res-area').style.display === 'block') renderPrescription();
    }

    async function startSystem() {
        if(!document.getElementById('ph').value) return alert("Please enter pH!");
        document.getElementById('cam-box').style.display = 'block';
        document.getElementById('start-btn').style.display = 'none';
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            v.srcObject = s;
            track = s.getVideoTracks()[0];
        } catch (e) { alert("Camera Error"); }
    }

    function processAI() {
        const ctx = c.getContext('2d');
        c.width = v.videoWidth; c.height = v.videoHeight;
        ctx.drawImage(v, 0, 0);
        
        const data = ctx.getImageData(0, 0, c.width, c.height).data;
        let greenPixels = 0;
        for(let i=0; i<data.length; i+=4) {
            if(data[i+1] > data[i] && data[i+1] > data[i+2]) greenPixels++;
        }
        
        const isPlant = (greenPixels / (data.length/4)) > 0.12;

        if(!isPlant) {
            document.getElementById('error-box').style.display = 'block';
            document.getElementById('error-box').innerText = lang === 'TR' ? 
                "⚠️ HATA: BİTKİ ALGILANAMADI! Lütfen kamerayı bir yaprağa tutun." : 
                "⚠️ ERROR: NO PLANT DETECTED! Please point the camera at a leaf.";
            return;
        }

        document.getElementById('error-box').style.display = 'none';
        v.style.display = 'none'; 
        c.style.display = 'block';
        document.getElementById('snap-btn').style.display = 'none';
        document.getElementById('reset-btn').style.display = 'block';
        renderPrescription();
    }

    function renderPrescription() {
        const ph = parseFloat(document.getElementById('ph').value);
        const out = document.getElementById('res-output');
        const exp = document.getElementById('expert-note');
        document.getElementById('res-area').style.display = 'block';

        let diagTR = "", diagEN = "", recTR = "", recEN = "", minTR = "", minEN = "";

        if(ph < 4.5) {
            diagTR = "KRİTİK ASİDİTE"; diagEN = "CRITICAL ACIDITY";
            recTR = "- 150kg/da Tarım Kireci"; recEN = "- 150kg/da Agric. Lime";
            minTR = "MİNERAL: Demir(Fe) kilitlenmesi."; minEN = "MINERAL: Iron(Fe) lock.";
        } else {
            diagTR = "OPTİMUM DENGELİ"; diagEN = "OPTIMUM BALANCE";
            recTR = "- Rutin pH Kontrolü"; recEN = "- Routine pH Control";
            minTR = "MİNERAL: Besin emilimi sağlıklı."; minEN = "MINERAL: Healthy uptake.";
        }

        out.innerText = `[TR] TEŞHİS: ${diagTR}\nÖNERİ: ${recTR}\n${minTR}\n\n` +
                        `[EN] DIAGNOSIS: ${diagEN}\nADVICE: ${recEN}\n${minEN}`;
        
        // ÇİFT DİLLİ UZMAN NOTU (Hocam buraya dikkat)
        exp.innerText = lang === 'TR' ? 
            "⚠️ UZMAN GÖRÜŞÜ: Çözülemeyen sorunlarda acil uzman desteği alınmalıdır." : 
            "⚠️ EXPERT ADVICE: Seek immediate expert support for unresolved issues.";
    }

    function resetSystem() {
        // Kamerayı ve arayüzü sıfırla
        document.getElementById('res-area').style.display = 'none';
        document.getElementById('cam-box').style.display = 'none';
        document.getElementById('snap-btn').style.display = 'block';
        document.getElementById('reset-btn').style.display = 'none';
        document.getElementById('start-btn').style.display = 'block';
        c.style.display = 'none';
        v.style.display = 'block';
        if(track) track.stop(); // Eski kamerayı kapat
    }
</script>
</body>
</html>
