<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çay Doktoru | Pro AI Reçeteli Tarım</title>
    <style>
        :root { --primary: #2e7d32; --secondary: #1b5e20; --accent: #ffd700; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); }
        h1 { text-align: center; color: var(--primary); font-size: 24px; margin-bottom: 5px; }
        .pro-badge { background: var(--accent); color: black; padding: 2px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; float: right; }
        
        /* Kamera Alanı */
        #camera-container { position: relative; width: 100%; height: 350px; background: #000; border-radius: 15px; overflow: hidden; margin: 20px 0; border: 4px solid #ddd; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; }
        .guide-box { width: 200px; height: 200px; border: 2px dashed rgba(255,255,255,0.7); border-radius: 10px; margin-bottom: 20px; }
        .guide-text { color: white; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; text-align: center; font-size: 14px; }

        /* Veri Girişi */
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: var(--secondary); }
        input[type="number"] { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-analyze { background: var(--primary); color: white; }
        .btn-flash { background: #555; color: white; font-size: 14px; padding: 8px; margin-bottom: 10px; }
        
        /* Sonuç Paneli */
        #result-panel { display: none; margin-top: 20px; padding: 15px; border-radius: 10px; background: #e8f5e9; border-left: 5px solid var(--primary); }
        .prescription { font-family: 'Courier New', Courier, monospace; font-weight: bold; color: #1b5e20; }
    </style>
</head>
<body>

<div class="container">
    <span class="pro-badge">PRO AI AKTİF</span>
    <h1>ÇAY DOKTORU 🍃</h1>
    <p style="text-align: center; font-size: 14px; color: #666;">30 Yıllık Tecrübe & Yapay Zeka Entegrasyonu</p>

    <div class="input-group">
        <label>Toprak pH Değeri (Cihazınızdan Okunan):</label>
        <input type="number" id="phValue" step="0.1" placeholder="Örn: 4.2" min="0" max="14">
    </div>

    <button class="btn-flash" onclick="toggleFlash()">🔦 Flaş Aç / Kapat</button>

    <div id="camera-container">
        <video id="video" autoplay playsinline></video>
        <div class="overlay">
            <div class="guide-box"></div>
            <div class="guide-text">
                <b>🔍 AI ANALİZ REHBERİ:</b><br>
                Yaprağa 10cm yaklaşın.<br>
                Netleşince "Analiz Et"e basın.
            </div>
        </div>
    </div>

    <button class="btn-analyze" onclick="startAnalysis()">HİBRİT ANALİZİ BAŞLAT</button>

    <div id="result-panel">
        <h3>📄 DİJİTAL REÇETE (QR Kodlu)</h3>
        <p id="analysis-text"></p>
        <div class="prescription" id="pres-details"></div>
        <p style="font-size: 10px; color: #999; margin-top: 10px;">* Bu reçete 30 yıllık akademik veri tabanı tarafından oluşturulmuştur.</p>
    </div>
</div>

<script>
    let stream;
    const video = document.getElementById('video');

    // Kamerayı Başlat
    async function initCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
        } catch (err) {
            alert("Kameraya ulaşılamadı. Lütfen izin verin.");
        }
    }

    // Flaş Kontrolü (Bazı Android tarayıcıları destekler)
    async function toggleFlash() {
        const track = stream.getVideoTracks()[0];
        const capabilities = track.getCapabilities();
        if (capabilities.torch) {
            const isFlashOn = track.getSettings().torch;
            await track.applyConstraints({
                advanced: [{ torch: !isFlashOn }]
            });
        } else {
            alert("Cihazınız tarayıcı üzerinden flaş kontrolünü desteklemiyor. Lütfen flaşı manuel açın.");
        }
    }

    // Analiz Simülasyonu
    function startAnalysis() {
        const ph = document.getElementById('phValue').value;
        if(!ph) { alert("Lütfen önce pH değerini girin!"); return; }

        const resultPanel = document.getElementById('result-panel');
        const analysisText = document.getElementById('analysis-text');
        const presDetails = document.getElementById('pres-details');

        resultPanel.style.display = "block";
        analysisText.innerText = "Yapay Zeka görüntüyü ve pH verisini çarpıştırıyor...";

        setTimeout(() => {
            if(ph < 4.5) {
                analysisText.innerText = "TEŞHİS: Yüksek Asidite & Besin Kilitlenmesi";
                presDetails.innerHTML = "REÇETE:<br>- 150 kg/dekar Tarım Kireci<br>- Magnezyum Sülfat Uygulaması<br>- 15 Gün Sonra Azot Kontrolü";
            } else {
                analysisText.innerText = "TEŞHİS: Toprak Dengeli, Görüntüde Zararlı İzleri";
                presDetails.innerHTML = "REÇETE:<br>- Organik Madde Takviyesi<br>- Vampir Kelebek İçin Biyolojik Mücadele<br>- Düzenli Gözlem";
            }
        }, 2000);
    }

    initCamera();
</script>

</body>
</html>
